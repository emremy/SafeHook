services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: safehook
      POSTGRES_PASSWORD: safehook
      POSTGRES_DB: safehook
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safehook -d safehook"]
      interval: 2s
      timeout: 2s
      retries: 20
  app:
    build:
      context: ../..
      dockerfile: real_world_examples/with_postgres/Dockerfile
    environment:
      DATABASE_URL: postgres://safehook:safehook@postgres:5432/safehook
    depends_on:
      postgres:
        condition: service_healthy
